name: Bug report
description: Report a reproducible problem with an Avionics for Wear OS watch face.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Avionics for Wear OS. Please remove personal information from screenshots and logs.

  - type: dropdown
    id: watch_face
    attributes:
      label: Watch face
      options:
        - Altitude
        - Artificial Horizon
        - Gyrocompass
        - Landing Zone
        - Radar Sweep
        - Radiocompass
        - Turn Coordinator
        - Multiple watch faces
    validations:
      required: true

  - type: input
    id: watch
    attributes:
      label: Watch model
      placeholder: Pixel Watch 3
    validations:
      required: true

  - type: input
    id: wear_os
    attributes:
      label: Wear OS version
      placeholder: Wear OS 5.1 / API 35
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version or commit
      description: Provide the release version, tag, or commit hash you built.
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: Explain what happened and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install ...
        2. Select ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or logs
      description: Drag files here after removing serial numbers, IP addresses, account details, and other personal data.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include active or ambient mode, custom settings, upgrade history, and anything else that may help.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed personal and sensitive information from attachments.
          required: true
